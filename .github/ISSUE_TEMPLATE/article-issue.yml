name: 記事起票（朝会素材集約）
description: 朝会の発表・議論をもとに記事素材を集約する。発表者が朝会後に起票。
title: "【BizDev朝会 #】"
labels: ["article"]
body:
  - type: input
    id: date
    attributes:
      label: 朝会日付
      placeholder: "2026-03-03"
    validations:
      required: true
  - type: input
    id: presenter
    attributes:
      label: 発表者
      placeholder: "@username"
    validations:
      required: true
  - type: input
    id: meet-recording
    attributes:
      label: Meet録画リンク（自動生成）
      placeholder: "https://drive.google.com/..."
  - type: input
    id: meet-transcript
    attributes:
      label: Meet議事録リンク（自動生成）
      placeholder: "https://docs.google.com/..."
  - type: input
    id: drive-folder
    attributes:
      label: Drive素材フォルダ（スライド・参考資料をアップロード済み）
      placeholder: "https://drive.google.com/drive/folders/..."
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: 発表の要旨
      description: 自身の発表内容を要約してください
    validations:
      required: true
  - type: textarea
    id: discussion
    attributes:
      label: 議論で出た論点
      description: |
        朝会で出た論点・反論・別視点を記録してください
      value: |
        - 論点1:
        - 論点2:
        - 反論・別視点:
  - type: textarea
    id: open-questions
    attributes:
      label: 結論が出なかった問い
      description: 記事の「読者への投げかけ」候補になります
  - type: textarea
    id: references
    attributes:
      label: 参考資料
      description: 外部記事・論文・データソース等のリンク
